<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODECRIP | Função Hash</title>
    <link rel="shortcut icon" href="descryption.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/hash.css">
</head>

<body>
    <nav class="top-navbar">
        <span class="logo">CODECRIP</span>
        <div class="nav-links">
            <a href="index.html">INÍCIO</a>
            <a href="cesar.html">CIFRA DE CÉSAR</a> 
            <a href="hash.html">FUNÇÃO HASH</a> 
        </div>
    </nav>
    
    <header class="hero-section">
        <h1>FUNÇÃO <span>HASH</span></h1>
    </header>

    <main>
        <section id="hash-container"> 
            <form id="hash-form">
                
                <div class="input-group">
                    <label for="texto-hash-input">Dados para Geração</label>
                    <textarea id="texto-hash-input" rows="5" placeholder="Digite ou cole o texto aqui para gerar a assinatura Hash..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="algoritmo-select">Algoritmo de Segurança</label>
                    <select id="algoritmo-select">
                        <option value="sha256">SHA-256 (Padrão de Mercado)</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="button" id="btn-hash">Gerar Código (Hash)</button>
                    <button type="reset" id="btn-limpar-hash">Limpar Campos</button>
                </div>

            </form>
            
            <div id="resultado-container">
                <div id="hash-output">A mensagem cifrada ou decifrada aparecerá aqui...</div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">CODECRIP</div>
            <p class="copyright">&copy; 2026 - Integridade de dados via Criptografia Avançada.</p>
        </div>
    </footer>

    <script src="../javascript/hash.js"></script>
</body>
</html>
