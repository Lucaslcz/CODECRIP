<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODECRIP | Cifra de César</title>
    <link rel="shortcut icon" href="descryption.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/cesar.css">
</head>

<body>
    <nav class="top-navbar">
        <span class="logo">CODECRIP</span>
        
        <button class="menu-toggle" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="nav-links">
            <a href="index.html">INÍCIO</a>
            <a href="cesar.html">CIFRA DE CÉSAR</a>
            <a href="hash.html">FUNÇÃO HASH</a>
        </div>
    </nav>

    <header class="hero-section">
        <h1>CIFRA DE <span>CÉSAR</span></h1>
    </header>

    <main>
        <section id="cifra-container"> 
            <form id="cripto-form">
                
                <div class="input-group">
                    <label for="texto-input">Mensagem Original ou Cifrada</label>
                    <textarea id="texto-input" rows="5" placeholder="Insira o texto aqui a ser cifrado ou decifrado aqui..."></textarea>
                </div>

                <div class="input-group">
                    <label for="chave-input">Valor do Deslocamento (Chave)</label>
                    <input type="number" id="chave-input" min="1" max="25" value="3" required>
                </div>

                <div class="button-group">
                    <button type="button" id="btn-cifrar">Cifrar Mensagem</button>
                    <button type="button" id="btn-decifrar">Decifrar Mensagem</button>
                    <button type="reset" id="btn-limpar">Limpar Tudo</button>
                </div>
            </form>
            
            <div id="resultado-container">
                <div id="resultado-output">A mensagem cifrada ou decifrada aparecerá aqui...</div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">CODECRIP</div>
            <p class="copyright">&copy; 2026 - Laboratório de Criptografia Experimental.</p>
        </div>
    </footer>

    <script src="../javascript/cesar.js"></script>
    <script src="../javascript/global.js"></script>
</body>
</html>
